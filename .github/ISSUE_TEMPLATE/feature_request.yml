name: Feature request
description: Suggest a new report, flag, or output improvement
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        aider-usage stays narrow: it reads a local analytics log and prints
        reports. Proposals adding telemetry, network calls, or live-session
        tracking are out of scope (see CONTRIBUTING.md).
  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed report / flag / behavior
    validations:
      required: true
